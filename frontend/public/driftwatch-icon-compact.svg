<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="DRIFTWATCH">
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#12203A"/>
      <stop offset="1" stop-color="#0A1322"/>
    </linearGradient>
    <linearGradient id="drift" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#2DD4BF"/>
      <stop offset="1" stop-color="#22D3EE"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="512" height="512" rx="116" fill="url(#tile)"/>
  <!-- threshold -->
  <line x1="84" y1="248" x2="430" y2="248" stroke="#52668A" stroke-width="20" stroke-linecap="round" stroke-dasharray="0 56"/>
  <!-- drift: flat then sharp breach -->
  <path d="M 80 350 L 220 338 L 320 318 L 392 132"
        fill="none" stroke="url(#drift)" stroke-width="44" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- breach flag -->
  <circle cx="392" cy="132" r="40" fill="none" stroke="#F59E0B" stroke-width="20"/>
  <circle cx="392" cy="132" r="16" fill="#FFFFFF"/>
</svg>
