<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="DRIFTWATCH">
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#12203A"/>
      <stop offset="1" stop-color="#0A1322"/>
    </linearGradient>
    <linearGradient id="drift" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#2DD4BF"/>
      <stop offset="1" stop-color="#22D3EE"/>
    </linearGradient>
    <radialGradient id="halo" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#F59E0B" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#F59E0B" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- tile -->
  <rect x="0" y="0" width="512" height="512" rx="120" fill="url(#tile)"/>
  <rect x="3" y="3" width="506" height="506" rx="117" fill="none" stroke="#2B3B57" stroke-width="2" opacity="0.6"/>

  <!-- threshold line -->
  <line x1="66" y1="238" x2="446" y2="238" stroke="#46597A" stroke-width="7" stroke-linecap="round" stroke-dasharray="2 26"/>

  <!-- drift signal: flat baseline -> breaks through threshold -->
  <path d="M 72 344 L 150 336 L 220 352 L 286 330 L 340 296 L 384 140"
        fill="none" stroke="url(#drift)" stroke-width="28" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- breach flag -->
  <circle cx="384" cy="140" r="52" fill="url(#halo)"/>
  <circle cx="384" cy="140" r="30" fill="none" stroke="#F59E0B" stroke-width="10"/>
  <circle cx="384" cy="140" r="13" fill="#FFFFFF"/>
</svg>
